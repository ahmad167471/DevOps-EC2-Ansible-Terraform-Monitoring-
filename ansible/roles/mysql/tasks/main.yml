---
- name: Install MySQL
  apt:
    name: mysql-server
    update_cache: yes
    state: present

- name: Start MySQL service
  service:
    name: mysql
    state: started
    enabled: yes

- name: Install Python MySQL dependencies
  apt:
    name: python3-pymysql
    state: present

##########################################################
# Create MySQL user
##########################################################

- name: Create MySQL user
  community.mysql.mysql_user:
    name: "{{ mysql_user }}"
    password: "{{ mysql_password }}"
    host: "%"
    priv: "*.*:ALL"
    state: present
    login_user: root
    login_unix_socket: /var/run/mysqld/mysqld.sock

##########################################################
# Create MySQL database
##########################################################

- name: Create MySQL database
  community.mysql.mysql_db:
    name: "{{ mysql_db }}"
    state: present
    login_user: root
    login_unix_socket: /var/run/mysqld/mysqld.sock

##########################################################
# Copy sample SQL
##########################################################

- name: Copy sample SQL
  copy:
    src: sample.sql
    dest: /tmp/sample.sql
    mode: '0644'

##########################################################
# Check if table exists
##########################################################

- name: Check if table 'users' exists
  community.mysql.mysql_query:
    login_user: root
    login_unix_socket: /var/run/mysqld/mysqld.sock
    login_db: "{{ mysql_db }}"
    query: "SHOW TABLES LIKE 'users';"
  register: check_users_table

##########################################################
# Seed database only if table doesn't exist
##########################################################

- name: Seed MySQL DB only if 'users' table does not exist
  command: mysql {{ mysql_db }} < /tmp/sample.sql
  args:
    executable: /bin/bash
  when: check_users_table.query_result | length == 0